name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scaffold:
    name: Scaffold validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate scaffold metadata
        run: python3 scripts/validate_scaffold.py

      - name: Ensure Git LFS is installed
        run: |
          if ! command -v git-lfs >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y git-lfs
          fi

      - name: Verify Git LFS is available
        run: git lfs install --local
